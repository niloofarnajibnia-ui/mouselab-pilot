<script>
 function sendMouselabData() {
  try {
    var data = document.forms["mlwebform"].elements["procdata"].value;
    var pid = document.forms["mlwebform"].elements["subject"].value;

    document.getElementById("sheet_participant_id").value = pid;
    document.getElementById("sheet_procdata").value = data;
    document.getElementById("sheet_timestamp").value = Date.now();
    document.getElementById("sheetForm").submit();

  } catch (e) {}
}

window.addEventListener("message", function(event) {
  if (event.data && event.data.type === "request_mouselab_data") {
    sendMouselabData();
  }
});
</script>
